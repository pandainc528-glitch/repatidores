<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ñan - Mis Pedidos</title>
    <link rel="stylesheet" href="driver-orders-styles.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Configuración de Firebase -->
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="page-header">
            <button class="back-btn" onclick="window.location.href='driver-dashboard.html'">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <h1 class="page-title">Mis Pedidos</h1>
            <div class="header-spacer"></div>
        </header>

        <!-- Filtros por estado -->
        <section class="filters-section">
            <button class="filter-btn active" data-status="all" onclick="filterByStatus('all')">
                Todos
            </button>
            <button class="filter-btn" data-status="aceptado" onclick="filterByStatus('aceptado')">
                Aceptados
            </button>
            <button class="filter-btn" data-status="en_camino" onclick="filterByStatus('en_camino')">
                En Camino
            </button>
            <button class="filter-btn" data-status="entregado" onclick="filterByStatus('entregado')">
                Entregados
            </button>
        </section>

        <!-- Estadísticas rápidas -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="activeOrders">0</div>
                <div class="stat-label">Activos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedToday">0</div>
                <div class="stat-label">Hoy</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="earningsToday">$0</div>
                <div class="stat-label">Ganancia</div>
            </div>
        </section>

        <!-- Lista de pedidos -->
        <section class="orders-section">
            <div class="orders-list" id="ordersList">
                <!-- Los pedidos se cargarán aquí -->
            </div>

            <!-- Estado de carga -->
            <div class="loading-state" id="loadingState">
                <div class="loading-spinner"></div>
                <p class="loading-text">Cargando tus pedidos...</p>
            </div>

            <!-- Estado vacío -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📦</div>
                <p class="empty-text">No tienes pedidos</p>
                <p class="empty-subtext">Los pedidos que aceptes aparecerán aquí</p>
                <button class="primary-btn" onclick="window.location.href='driver-dashboard.html'">
                    Buscar Pedidos
                </button>
            </div>
        </section>

        <!-- Navegación inferior -->
        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='driver-dashboard.html'">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span class="nav-label">Inicio</span>
            </button>
            
            <button class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                </svg>
                <span class="nav-label">Mis Pedidos</span>
            </button>
            
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span class="nav-label">Perfil</span>
            </button>
        </nav>
    </div>

    <script src="driver-orders-script.js"></script>
</body>
</html>
