<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ñan - Navegación</title>
    <link rel="stylesheet" href="driver-map-styles.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Configuración de Firebase -->
    <script src="firebase-config.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header con información del pedido -->
        <header class="map-header">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <div class="header-info">
                <h1 class="order-title" id="orderTitle">Navegando al cliente</h1>
                <p class="customer-name" id="customerName">Cliente</p>
            </div>
            <button class="refresh-btn" onclick="updateMyLocation()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/>
                </svg>
            </button>
        </header>

        <!-- Mapa -->
        <div id="map" class="map-container"></div>

        <!-- Panel de información -->
        <div class="info-panel">
            <!-- Distancia y tiempo estimado -->
            <div class="route-info">
                <div class="route-stat">
                    <div class="stat-icon">📏</div>
                    <div>
                        <div class="stat-value" id="distanceValue">-- km</div>
                        <div class="stat-label">Distancia</div>
                    </div>
                </div>
                <div class="route-stat">
                    <div class="stat-icon">⏱️</div>
                    <div>
                        <div class="stat-value" id="timeValue">-- min</div>
                        <div class="stat-label">Estimado</div>
                    </div>
                </div>
            </div>

            <!-- Información del cliente -->
            <div class="client-info">
                <div class="info-row">
                    <svg class="info-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <div class="info-text" id="deliveryAddress">Cargando dirección...</div>
                </div>
                <div class="info-row" id="notesRow" style="display: none;">
                    <svg class="info-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                    </svg>
                    <div class="info-text" id="deliveryNotes">Notas</div>
                </div>
            </div>

            <!-- Botones de acción -->
            <div class="action-buttons">
                <button class="action-btn btn-call" onclick="callCustomer()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                    Llamar Cliente
                </button>
                <button class="action-btn btn-navigate" onclick="openMapsNavigation()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                    </svg>
                    Abrir en Maps
                </button>
            </div>

            <!-- Estado del pedido -->
            <div class="order-status-panel">
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span class="status-text">En Camino</span>
                </div>
                <button class="complete-btn" id="completeBtn" onclick="showCompleteModal()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
                    </svg>
                    Marcar Entregado
                </button>
            </div>
        </div>
    </div>

    <script src="driver-map-script.js"></script>
</body>
</html>
